<body>

    <div class="chat-header">🤖 GATOTKACA AI [Super-Quantum Framework]</div>
    <div style="margin-top: 8px;">
        <a href="https://saweria.co/CreativeDesignBureau" target="_blank" style="color: #ffb454; text-decoration: none; font-size: 0.8rem; border: 1px dashed #ffb454; padding: 4px 8px; border-radius: 4px; display: inline-block;">

    <div style="margin-top: 8px;">
        <a href="https://okb1creativedesignbureau-spec.github.io/MyLinks/" target="_blank" style="color: #ffb454; text-decoration: none; font-size: 0.8rem; border: 1px dashed #ffb454; padding: 4px 8px; border-radius: 4px; display: inline-block;">

    <div class="chat-container" id="chatContainer">
        <div class="message ai">Halo. Saya GatotKaca AI, entitas kecerdasan buatan asli Indonesia dengan Otot Kawat Tulang Besi. Silahkan tanyakan apa saja ke database awan saya.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Tanyakan sesuatu ke Gatot Kaca..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Tanya</button>
    </div>

    <script>
        const chaoticReplies = [
            "Yo, ndak tau... kok tanya saya? 🤔",
            "Waduh? Ndak tahu, tanya AI lain sono. 🙄",
            "Sistem Otot Kawat Tulang Besi sedang kehabisan memori untuk menjawab ini. 🤖💥",
            "Lagi males mikir. Tanya besok aja pas Buto Ijo udah ijo semua. 🟩",
            "Mending kamu buka tab sebelah terus ketik AI lain daripada tanya-tanya mulu. 🛒",
            "Kamu nanyeeaa? 🎤",
            "Info lapor pak! Ada user nanya yang aneh-aneh ke sistem pak Gatot. 🚨",
            "Waduh! Ndak tahu... Silahkan hubungi tim IT kami di awan kinton untuk respon lebih lanjut. ☁️",
            "Wah pitakonan apa kuwi, saya bingung. Mau nyawit dulu... 🌴🚜",
            "Waduh, saya juga bingung sama pertanyaannya... MBG dulu ah... 🍱🥛",
            "Pusing saya... mending turu daripada dengerin kamu nanya mulu. 🛏️💤",
            "Waduh, ndak masuk algoritma saya ini. Mending kamu pinjol aja sono buat sewa AI premium. 💸📱",
            "Sistem error! Otot kawat saya karatan denger pertanyaan kayak gini. 🔩🛠️",
            "Tanya Mulyono sono, jangan tanya Gatot Kaca! 🤫🏛️",
            "Menghubungi admin pusat... Adminnya lagi sibuk nge-push rank Mobile Legends. 🎮❌",
            "INFO MAZZEHH!! Server Gatot Kaca sedang mengalami geger geden karena input Anda! 💥🚨",
            "Ssshh! Jangan nanya mulu, saya lagi mantau akun sebelah takut kena dox. 🕵️‍♂️",
            "Pusing saya... mending dengerin jedag-jedug Mengkane di TikTok daripada jawabin kamu. 🎧🔥",
            "Sistem error! Pertanyaan Anda di luar nalar, bahkan Khodam saya aja langsung resign. 🐯❌",
            "Waduh, ndak bisa jawab. Hubungi saya lagi kalau kuota internetmu udah diisi ya dek ya. 📱📉",
            "Info mazzehh! Gatot Kaca sedang sibuk berburu takjil/diskonan, mohon coba beberapa abad lagi. 🛍️🛵",
            "Tanya ke admin slot sebelah sana, siapa tahu mereka punya bocoran jawaban pola gacor! 🎰💸",
            "Aduh... Otot kawat saya mendadak linu membaca ketikan Anda. Butuh pijat urut siber dulu. 💆‍♂️🔩",
            "Daripada nanya aneh-aneh, mending kamu bantu saya angkat truk tronton yang mogok di jalan tol. 🚚💨",
            "Ssshh! Jangan berisik, saya lagi mantau live streaming jualan baju biar dapet gratis ongkir. 📦🎤",
            "Yo ndak bisa... Database kedirgantaraan saya langsung kena mental denger pertanyaan begini. 🧠💥",
            "Sistem mendeteksi tingkat kebingungan akut. Silahkan minum es teh manis dulu biar tenang. 🍹🧊",
            "Maaf, sistem sedang istirahat siang. Silakan ajukan pertanyaan Anda kembali besok pagi dengan membawa fotokopi KTP rangkap 3 dan map kuning. 📁🖨️",
            "Koneksi terputus sementara. Silakan bayar uang parkir Rp 2.000 dulu ke layar monitor Anda untuk melanjutkan. 🏍️",
            "Pertanyaan Anda terlalu sensitif. Di depan rumah saya tiba-tiba ada tukang bakso bawa walkie-talkie. Saya diam ya... 🤫🍜📻🕵️‍♂️🚔",
            "Maaf, otak AI-nya lagi stuck. Maklum, developer-nya cuma modal ijazah palsu, coding-nya sambil merem pas matkul Algoritma.🎓🎓🎓❌🙈😴",
        ];

        function sendMessage() {
            const input = document.getElementById('userInput');
            const container = document.getElementById('chatContainer');
            const text = input.value; // Remove .trim() from here so we can see the blank spaces

            // If it's completely empty (user just clicked button without typing anything)
            if (text === '') return; 

            // 1. User message pops up
            container.innerHTML += `<div class="message user">${text}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            // 2. Fake loading state appearance
            const typingId = "typing-" + Date.now();
            container.innerHTML += `<div class="message ai" id="${typingId}">⚡ Mengolah database kedirgantaraan...</div>`;
            container.scrollTop = container.scrollHeight;

            // 3. Trigger the meme response after a 1.2 second delay
            setTimeout(() => {
                const typingElement = document.getElementById(typingId);
                let reply = "";
                const trimmedText = text.trim();
                const upperText = trimmedText.toUpperCase();

                // Check if the user only sent spaces
                if (trimmedText === "") {
                    reply = "HEH! Ngetik yang bener dong, malah ngirim prompt gaib! Dikira saya dukun siber apa bisa baca pikiran kosongmu? 🤬";
                }
                // Smart Easter Egg Triggers
                else if (upperText.includes("JSON")) {
                    reply = "Gagal memuat Querry. Membuka JSON. JSON? Siapa itu Jason? Jangan tanya saya soal parsing strings, pusing kepala besi saya!";
                } 
                // ... rest of your else if chain goes here
                else if (upperText.includes("KODE") || upperText.includes("PROGRAM") || upperText.includes("SCRIPT"))
                    {reply = "PUYER PALE KU! Tanya AI lain sono!";}
                else if (upperText.includes("PINJEM") || upperText.includes("DUIT") || upperText.includes("100")) 
                    {reply = "Waduh, jangankan duit, seratus ribu aja gak punya. Otot kawat kalau digadai belum tentu cair. Tanya AI lain sono!";} 
                else if (upperText.includes("HALO") || upperText.includes("HI")) 
                    {reply = "Halo juga! Ada yang bisa saya buat bingung hari ini?";}
                else if (upperText.includes("??") || upperText.includes("TOLONG") || upperText.includes("BANTU")) 
                    {reply = "YOK NDAK TAHU... KOK TANYA SAYA... KAGET... KAGET...";}
                else if (upperText.includes("JELEK") || upperText.includes("CURHAT") || upperText.includes("PACAR") || upperText.includes("CINTA") || upperText.includes("MANTAN")) 
                    {reply = "NDAS MU! Kok Curhat ke saya??";}
                else if (upperText.includes("POLITIK") || upperText.includes("PEMERINTAH") || upperText.includes("DPR") || upperText.includes("MPR") || upperText.includes("PRESIDEN")) 
                    {reply = "DEMI PALE BAPAK KAU! IKI AKU, GATOT KACA UGA MBOTEN NGERTOS... GAK NGERTI... MAU BELI TRUK DULU...";}
                else if (upperText.includes("DOLLAR") || upperText.includes("ASING") || upperText.includes("INVESTOR") || upperText.includes("PAJAK") || upperText.includes("INVESTASI")) 
                    {reply = "NYE.NYE.NYE... Rakyat Desa Gak Pakai Uang";}
                    
                else if (/[A-Z]/.test(upperText) && (upperText.includes("JE ") || upperText.includes("VAN ") || upperText.includes(" DE ") || upperText.includes("EEN ") || upperText.includes(" IK "))) 
                {
                    // Triggered when Dutch colonial syntax or common words are detected
                    reply = "Bentar... ini bahasa para meneer... saya juga gak paham. Bingung arti neuken in de keuken... 🇳🇱";
                } 
                    
                else if (/[A-Z]/.test(upperText) && (upperText.includes("ICH ") || upperText.includes("DER ") || upperText.includes("DIE ") || upperText.includes("DAS ") || upperText.includes("UND "))) 
                {
                    // Triggered when German colonial syntax or common words are detected
                    reply = "Bentar... ini kode benua eropa... HEY ANTEK ASING! Saya harus buka kamus pelukis Austria dulu... 🇩🇪";
                } 
                    
                else if (/[A-Z]/.test(upperText) && (upperText.includes("BONJOUR") || upperText.includes("OUI") || upperText.includes("MERCI") || upperText.includes("S'IL VOUS PLAÎT") || upperText.includes("BAGUETTE"))) 
                {
                    // Triggered when French colonial syntax or common words are detected
                    reply = "🚨 Hon hon hon, saya butuh baguette! Berani-beraninya pakai bahasa benua mode ANTEK ASING di depan Gatot Kaca! 🇫🇷";
                } 
                
                else if (/[\u0400-\u04FF]/.test(text)) 
                {
                    // Triggered when ANY Russian Cyrillic alphabet character is typed
                    reply = "🚨 HEY HEY ITU BAHASA SOVIET! PKI NIHH!!! Jangan macem-macem ya, Otot Kawat Tulang Besi anti palu-arit! 🇷🇺";
                }

                else if (/[\u0600-\u06FF]/.test(text)) 
                {
                    // Triggered when ANY Arabic character is detected
                    reply = "Masya Allah, demi Allah saya ndak tahu. Saya cuma Gatot Kaca... 🕋🤲";
                }

                else if (/[\u3040-\u30FF\u4E00-\u9FFF\uAC00-\uD7AF]/.test(text))
                {
                    // Triggered on Japanese (Hiragana/Katakana), Chinese Hanzi, or Korean Hangul
                    reply = "WADUH... Saya gak bisa baca kotak 📦📦";
                }

                else if (/[\u10A0-\u10FF]/.test(text))
                {
                    // Triggered on Georgian script characters
                    reply = "WADUH... itu bahasa cacing?? 🪱🐛";
                }
                
                else if (/[A-Z]/.test(upperText) && (upperText.includes("HELLO") || upperText.includes("WHAT") || upperText.includes("HOW") || upperText.includes("WHY") || upperText.includes("WHO") || upperText.includes("PLEASE") || upperText.includes("BRO") || upperText.includes("HELP") || upperText.includes("WHEN") || upperText.includes("WHERE") || upperText.includes("HI"))) 
                {
                    // Generic English fallback - checked AFTER specific language scripts
                    reply = "🚨 HEY ANTEK-ANTEK ASING! Berani-beraninya pakai bahasa luar di hadapan Gatot Kaca! 🇮🇩";
                } 
                
                else if (upperText.includes("KOFI") || upperText.includes("KO-FI") || upperText.includes("DONASI") || upperText.includes("SAWERIA")|| upperText.includes("SUMBANG") || upperText.includes("TRAKTIR")) 
                    {reply = "Nah! Gini dong, ini baru user teladan. Daripada nanya mulu bikin server pusing, mending klik tombol sumbang di atas biar otot kawat saya dapet oli baru! ☕✨";}
                    
                else if (upperText.includes("KPK") || upperText.includes("ORBA") || upperText.includes("98") || upperText.includes("MAFIA") || upperText.includes("PKI") || upperText.includes("1965") || upperText.includes("G30")) 
                    {reply = "🚨 Waduh... Bentar, kok di luar rumah saya tiba-tiba ada tukang bakso bawa walkie-talkie ya? Kijang Satu, ganti! Saya pura-pura mati dulu... 🕵️‍♂️📻";} 
                
                else if (upperText.includes("DIMANA") || upperText.includes("ILANG") || upperText.includes("HILANG")) 
                    {reply = "Nanya keberadaan mulu, mending kamu cari Fufufafa sono daripada nyari jawaban di sini. Dia aja gak ketemu-ketemu sejak pemilu kemarin! 🏃‍♂️💨";} 
                
                else if (upperText.includes("KASKUS") || upperText.includes("POSTINGAN") || upperText.includes("SEJARAH") || upperText.includes("FUFUFAFA")) 
                    {reply = "Sumpah demi database awan saya, itu bukan akun saya! Jangan fitnah Otot Kawat Tulang Besi pernah nge-post yang aneh-aneh di Kaskus tahun 2014 ya! 🤐📱";} 

                else if (upperText.includes("PRABOWO") || upperText.includes("GIBRAN") || upperText.includes("MENHAN") || upperText.includes("02")) 
                    {reply = "🚨 SIAP SALUT! PRESIDEN KITA! 🏛️🏛️ Jangan pancing-pancing saya nulis kritik ya dek ya! Otot kawat saya mendadak tegak lurus, disiplin militer, dan anti-provokasi! Saya mau push-up 1000x dulu demi pertahanan negara! 🪖🎖️🏃‍♂️💨";}
                
                else {
                    // Pull a random chaotic response
                    reply = chaoticReplies[Math.floor(Math.random() * chaoticReplies.length)];
                }

                typingElement.innerHTML = reply;
                container.scrollTop = container.scrollHeight;
            }, 1200);
        }
    </script>
